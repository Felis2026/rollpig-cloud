name: Deploy rollpig-cloud

on:
  push:
    branches:
      - main
    paths:
      - "rollpig_cloud/**"
      - "tools/**"
      - "deploy/**"
      - "Dockerfile"
      - "requirements.lock"
      - "requirements.txt"
      - ".github/workflows/deploy-cloud.yml"
  workflow_dispatch:

concurrency:
  group: rollpig-cloud-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate Python syntax
        run: python -m compileall -q rollpig_cloud tools

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    env:
      DEPLOY_HOST: ${{ secrets.ROLLPIG_DEPLOY_HOST }}
      DEPLOY_PORT: ${{ secrets.ROLLPIG_DEPLOY_PORT }}
      DEPLOY_USER: ${{ secrets.ROLLPIG_DEPLOY_USER }}
      DEPLOY_ROOT: ${{ secrets.ROLLPIG_DEPLOY_ROOT }}
      DEPLOY_SSH_KEY: ${{ secrets.ROLLPIG_DEPLOY_SSH_KEY }}
      DEPLOY_KNOWN_HOSTS: ${{ secrets.ROLLPIG_DEPLOY_KNOWN_HOSTS }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate deployment secrets
        shell: bash
        run: |
          set -eu
          for name in DEPLOY_HOST DEPLOY_PORT DEPLOY_USER DEPLOY_ROOT DEPLOY_SSH_KEY DEPLOY_KNOWN_HOSTS; do
            if [ -z "${!name:-}" ]; then
              echo "Missing GitHub Actions secret: $name" >&2
              exit 1
            fi
          done

      - name: Build deployment package
        run: |
          tar -czf "/tmp/rollpig-cloud-${GITHUB_SHA}.tar.gz" \
            rollpig_cloud tools deploy Dockerfile requirements.lock requirements.txt

      - name: Configure SSH
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" | tr -d '\r' > ~/.ssh/id_ed25519
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/id_ed25519 ~/.ssh/known_hosts

      - name: Upload deployment package
        run: |
          scp -P "$DEPLOY_PORT" \
            "/tmp/rollpig-cloud-${GITHUB_SHA}.tar.gz" \
            "$DEPLOY_USER@$DEPLOY_HOST:/tmp/rollpig-cloud-${GITHUB_SHA}.tar.gz"

      - name: Deploy and verify
        run: |
          ssh -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "sh '$DEPLOY_ROOT/deploy/apply-github-package.sh' '/tmp/rollpig-cloud-${GITHUB_SHA}.tar.gz' '${GITHUB_SHA}'"

      - name: Verify public Cloud
        if: ${{ vars.ROLLPIG_DEPLOY_PUBLIC_URL != '' }}
        env:
          DEPLOY_PUBLIC_URL: ${{ vars.ROLLPIG_DEPLOY_PUBLIC_URL }}
        run: |
          curl --fail --silent --show-error \
            --retry 5 --retry-delay 3 \
            "$DEPLOY_PUBLIC_URL" > /dev/null
